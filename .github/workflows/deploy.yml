name: deploy

on:
  workflow_run:
    workflows:
      - container-security
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.SELF_HOSTED_DEPLOY != 'false' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux, x64, codify-ip-ci]
    env:
      CODIFY_IP_VALIDATION_MODE: deploy-main
      CODIFY_IP_VALIDATION_TIMEOUT_SECONDS: "900"
      CODIFY_IP_REQUEST_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      CODIFY_IP_REQUEST_REF: refs/heads/${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy prerequisites
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUEST_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${REQUEST_SHA}&branch=main&event=push&per_page=50"
          deadline=$((SECONDS + 300))

          while [ "${SECONDS}" -lt "${deadline}" ]; do
            runs="$(curl -fsS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}")"

            ci="$(jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion // "in_progress"' <<<"${runs}" | head -n1)"
            security="$(jq -r '.workflow_runs[] | select(.name == "container-security") | .conclusion // "in_progress"' <<<"${runs}" | head -n1)"

            if [ "${ci}" = "success" ] && [ "${security}" = "success" ]; then
              exit 0
            fi

            case "${ci}:${security}" in
              *failure*|*cancelled*|*timed_out*)
                echo "::error::Deploy prerequisites failed for ${REQUEST_SHA}: CI=${ci:-missing} container-security=${security:-missing}"
                exit 1
                ;;
            esac

            echo "Waiting for deploy prerequisites: CI=${ci:-missing} container-security=${security:-missing}"
            sleep 10
          done

          echo "::error::Timed out waiting for deploy prerequisites for ${REQUEST_SHA}"
          exit 1

      - name: Request trusted deploy
        run: scripts/trusted-ci-request.sh
