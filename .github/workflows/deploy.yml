name: deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.SELF_HOSTED_DEPLOY == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux]
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/app/ip' }}
    steps:
      - name: Deploy local checkout
        run: |
          set -euo pipefail

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            echo "::error::DEPLOY_PATH does not contain a git checkout: $DEPLOY_PATH"
            exit 1
          fi

          cd "$DEPLOY_PATH"
          git fetch origin main

          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Refusing to deploy because $DEPLOY_PATH has uncommitted changes."
            git status --short
            exit 1
          fi

          git merge --ff-only origin/main
          ./scripts/refresh-dbip-lite.sh
