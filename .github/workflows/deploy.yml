name: deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.SELF_HOSTED_DEPLOY != 'false' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, linux, x64, codify-ip-ci]
    env:
      CODIFY_IP_VALIDATION_MODE: deploy-main
      CODIFY_IP_VALIDATION_TIMEOUT_SECONDS: "900"
      CODIFY_IP_REQUEST_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      CODIFY_IP_REQUEST_REF: refs/heads/${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Request trusted deploy
        run: scripts/trusted-ci-request.sh
