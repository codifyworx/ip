name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 4 3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - run: go test ./...

  trivy-images:
    name: trivy / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: codify-ip
            context: .
            file: Dockerfile
            image: local/codify-ip:${{ github.sha }}
            platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ matrix.image }}
          cache-from: type=gha,scope=ci-trivy-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=ci-trivy-${{ matrix.name }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  deploy:
    needs:
      - test
      - trivy-images
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux]
    steps:
      - name: Check deploy credentials
        id: deploy-credentials
        env:
          PUBLISH_SSH_KEY_BASE64: ${{ secrets.PUBLISH_SSH_KEY_BASE64 }}
          PUBLISH_SSH_KEY: ${{ secrets.PUBLISH_SSH_KEY }}
        run: |
          if [ -n "$PUBLISH_SSH_KEY_BASE64" ] || [ -n "$PUBLISH_SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy because PUBLISH_SSH_KEY_BASE64 or PUBLISH_SSH_KEY is not configured."
          fi

      - name: Set up deploy SSH key
        if: steps.deploy-credentials.outputs.configured == 'true'
        env:
          PUBLISH_SSH_KEY_BASE64: ${{ secrets.PUBLISH_SSH_KEY_BASE64 }}
          PUBLISH_SSH_KEY: ${{ secrets.PUBLISH_SSH_KEY }}
          PUBLISH_HOST: ${{ vars.PUBLISH_HOST || 'codifyworx.com' }}
        run: |
          key_path="${RUNNER_TEMP}/publish_key"
          known_hosts_path="${RUNNER_TEMP}/publish_known_hosts"

          python3 - "$key_path" <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          key_b64 = os.environ.get("PUBLISH_SSH_KEY_BASE64", "").strip()
          raw_key = os.environ.get("PUBLISH_SSH_KEY", "")
          if key_b64:
              key = base64.b64decode(key_b64).decode("utf-8")
          elif raw_key:
              key = raw_key.replace("\r", "").replace("\\n", "\n")
          else:
              raise SystemExit("Missing publish SSH key secret. Set PUBLISH_SSH_KEY_BASE64 or PUBLISH_SSH_KEY.")
          if not key.endswith("\n"):
              key += "\n"
          Path(sys.argv[1]).write_text(key)
          PY
          chmod 600 "$key_path"
          ssh-keygen -y -f "$key_path" >/dev/null
          ssh-keyscan -H "$PUBLISH_HOST" > "$known_hosts_path" 2>/dev/null
          if [ ! -s "$known_hosts_path" ]; then
            echo "::error::ssh-keyscan did not return a host key for $PUBLISH_HOST."
            exit 1
          fi
          chmod 600 "$known_hosts_path"
          {
            echo "PUBLISH_KEY_PATH=$key_path"
            echo "PUBLISH_KNOWN_HOSTS=$known_hosts_path"
          } >> "$GITHUB_ENV"

      - name: Deploy to publish host
        if: steps.deploy-credentials.outputs.configured == 'true'
        env:
          PUBLISH_HOST: ${{ vars.PUBLISH_HOST || 'codifyworx.com' }}
          PUBLISH_USER: ${{ vars.PUBLISH_USER || 'root' }}
        run: |
          ssh \
            -i "$PUBLISH_KEY_PATH" \
            -o UserKnownHostsFile="$PUBLISH_KNOWN_HOSTS" \
            -o StrictHostKeyChecking=yes \
            "${PUBLISH_USER}@${PUBLISH_HOST}" <<'SSH_EOF'
          set -euo pipefail
          mkdir -p /app
          if [ ! -d /app/ip/.git ]; then
            git clone https://github.com/codifyworx/ip.git /app/ip
          fi
          cd /app/ip
          if [ -n "$(git status --porcelain)" ]; then
            echo "Refusing to deploy because /app/ip has uncommitted changes:" >&2
            git status --short >&2
            exit 1
          fi
          git fetch origin main
          git merge --ff-only origin/main
          ./scripts/refresh-dbip-lite.sh
          SSH_EOF
      - name: Cleanup deploy SSH key
        if: always()
        run: |
          if [ -n "${PUBLISH_KEY_PATH:-}" ]; then
            rm -f "$PUBLISH_KEY_PATH"
          fi
          if [ -n "${PUBLISH_KNOWN_HOSTS:-}" ]; then
            rm -f "$PUBLISH_KNOWN_HOSTS"
          fi
