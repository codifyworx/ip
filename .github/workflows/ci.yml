name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - run: gofmt -w main.go
      - run: go mod tidy
      - run: go test ./...
      - run: docker build -t codifyworx/ip:ci .
