name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 4 3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - run: go test ./...
