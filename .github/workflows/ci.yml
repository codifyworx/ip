name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - run: gofmt -w main.go
      - run: go mod tidy
      - run: go test ./...
      - run: docker build -t codifyworx/ip:ci .
      - name: Set up deploy SSH key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_SSH_KEY_BASE64: ${{ secrets.PUBLISH_SSH_KEY_BASE64 }}
          PUBLISH_SSH_KEY: ${{ secrets.PUBLISH_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_b64 = os.environ.get("PUBLISH_SSH_KEY_BASE64", "").strip()
          raw_key = os.environ.get("PUBLISH_SSH_KEY", "")
          if key_b64:
              key = base64.b64decode(key_b64).decode("utf-8")
          elif raw_key:
              key = raw_key.replace("\r", "").replace("\\n", "\n")
          else:
              raise SystemExit("Missing publish SSH key secret. Set PUBLISH_SSH_KEY_BASE64 or PUBLISH_SSH_KEY.")
          if not key.endswith("\n"):
              key += "\n"
          Path(os.path.expanduser("~/.ssh/publish_key")).write_text(key)
          PY
          chmod 600 ~/.ssh/publish_key
          ssh-keyscan -H ${{ vars.PUBLISH_HOST || 'codifyworx.com' }} >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<SSH_EOF
          Host ${{ vars.PUBLISH_HOST || 'codifyworx.com' }}
            IdentityFile ~/.ssh/publish_key
            StrictHostKeyChecking accept-new
          SSH_EOF
          chmod 600 ~/.ssh/config
      - name: Deploy to codifyworx.com
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_HOST: ${{ vars.PUBLISH_HOST || 'codifyworx.com' }}
          PUBLISH_USER: ${{ vars.PUBLISH_USER || 'root' }}
        run: |
          ssh "${PUBLISH_USER}@${PUBLISH_HOST}" <<'SSH_EOF'
          set -euo pipefail
          mkdir -p /app
          if [ ! -d /app/ip/.git ]; then
            git clone https://github.com/codifyworx/ip.git /app/ip
          fi
          cd /app/ip
          git fetch origin main
          git reset --hard origin/main
          mkdir -p geoip
          docker compose up -d --build
          SSH_EOF
      - name: Cleanup deploy SSH key
        if: always()
        run: rm -f ~/.ssh/publish_key ~/.ssh/config
