name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 4 3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: stable
          cache: false
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - run: go test ./...

  trivy-images:
    name: ci trivy / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: codify-ip
            context: .
            file: Dockerfile
            image: local/codify-ip:${{ github.sha }}
            platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ matrix.image }}
          cache-from: type=gha,scope=ci-trivy-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=ci-trivy-${{ matrix.name }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
