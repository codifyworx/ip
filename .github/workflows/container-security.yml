name: container-security

on:
  # This public repo uses a repo-scoped trusted request runner. Do not run this
  # host-side Docker scan from pull_request events.
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 1"

permissions:
  contents: read

jobs:
  trivy-images:
    name: trusted trivy image scan
    runs-on: [self-hosted, linux, x64, codify-ip-ci]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request trusted container security validation
        env:
          CODIFY_IP_VALIDATION_MODE: container-security
          CODIFY_IP_VALIDATION_TIMEOUT_SECONDS: "3600"
        run: scripts/trusted-ci-request.sh
